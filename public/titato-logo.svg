<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dégradés pour effet chrome et verre -->
    <linearGradient id="chromeBevel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="20%" style="stop-color:#e0e0e0"/>
      <stop offset="40%" style="stop-color:#a0a0a0"/>
      <stop offset="60%" style="stop-color:#c0c0c0"/>
      <stop offset="80%" style="stop-color:#e0e0e0"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
    
    <linearGradient id="deepBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2a"/>
      <stop offset="50%" style="stop-color:#050515"/>
      <stop offset="100%" style="stop-color:#000010"/>
    </linearGradient>
    
    <linearGradient id="neonBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff"/>
      <stop offset="50%" style="stop-color:#0088ff"/>
      <stop offset="100%" style="stop-color:#0044ff"/>
    </linearGradient>
    
    <linearGradient id="silverMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="25%" style="stop-color:#d0d0d0"/>
      <stop offset="50%" style="stop-color:#a0a0a0"/>
      <stop offset="75%" style="stop-color:#d0d0d0"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
    
    <linearGradient id="textChrome" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e8e8"/>
      <stop offset="30%" style="stop-color:#b0b0b0"/>
      <stop offset="70%" style="stop-color:#808080"/>
      <stop offset="100%" style="stop-color:#606060"/>
    </linearGradient>
    
    <linearGradient id="glassSurface" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    
    <radialGradient id="lensFlare" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8"/>
      <stop offset="30%" style="stop-color:#00ffff;stop-opacity:0.5"/>
      <stop offset="70%" style="stop-color:#0066ff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0"/>
    </radialGradient>
    
    <!-- Filtres pour effets de lueur et ombre -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    
    <filter id="innerShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feComponentTransfer in="SourceAlpha">
        <feFuncA type="table" tableValues="1 0"/>
      </feComponentTransfer>
      <feGaussianBlur stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fond noir pur -->
  <rect x="0" y="0" width="512" height="512" fill="#000000"/>
  
  <!-- Boîtier d'application principal -->
  <g transform="translate(56, 56)">
    <!-- Bord extérieur chromé biseauté -->
    <rect x="0" y="0" width="400" height="400" rx="80" fill="url(#chromeBevel)" filter="url(#shadow)"/>
    
    <!-- Bord intérieur -->
    <rect x="8" y="8" width="384" height="384" rx="72" fill="url(#deepBlue)"/>
    
    <!-- Surface de verre -->
    <rect x="8" y="8" width="384" height="384" rx="72" fill="url(#glassSurface)"/>
    
    <!-- Arrière-plan avec circuits imprimés -->
    <g opacity="0.15">
      <!-- Lignes de circuit -->
      <path d="M 280 40 L 320 40 L 320 70 L 350 70" stroke="#00ffff" stroke-width="1.5" fill="none"/>
      <circle cx="350" cy="70" r="3" stroke="#00ffff" stroke-width="1.5" fill="none"/>
      
      <path d="M 290 90 L 330 90 L 330 120 L 360 120" stroke="#00ffff" stroke-width="1.5" fill="none"/>
      <circle cx="360" cy="120" r="3" stroke="#00ffff" stroke-width="1.5" fill="none"/>
      
      <path d="M 300 140 L 340 140 L 340 170 L 370 170" stroke="#00ffff" stroke-width="1.5" fill="none"/>
      <circle cx="370" cy="170" r="3" stroke="#00ffff" stroke-width="1.5" fill="none"/>
      
      <path d="M 50 280 L 80 280 L 80 310 L 110 310" stroke="#00ffff" stroke-width="1.5" fill="none"/>
      <circle cx="110" cy="310" r="3" stroke="#00ffff" stroke-width="1.5" fill="none"/>
      
      <!-- Gravure HTG en arrière-plan (haut) -->
      <text x="320" y="200" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="#0044ff" opacity="0.3">HTG</text>
    </g>
    
    <!-- Grille de morpion 3D inclinée -->
    <g transform="translate(60, 60) rotate(-8)" filter="url(#shadow)">
      <!-- Bloc de la grille -->
      <rect x="0" y="0" width="200" height="200" rx="10" fill="#0a0a2a" stroke="url(#chromeBevel)" stroke-width="4"/>
      
      <!-- Épaisseur 3D -->
      <path d="M 0 200 L 15 215 L 215 215 L 200 200" fill="#050515"/>
      <path d="M 200 0 L 215 15 L 215 215 L 200 200" fill="#050515"/>
      
      <!-- Lignes de la grille -->
      <line x1="66" y1="10" x2="66" y2="190" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
      <line x1="133" y1="10" x2="133" y2="190" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
      <line x1="10" y1="66" x2="190" y2="66" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
      <line x1="10" y1="133" x2="190" y2="133" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
      
      <!-- Symboles X (chrome argenté) -->
      <g stroke="url(#silverMetal)" stroke-width="8" stroke-linecap="round" filter="url(#glow)">
        <!-- Ligne du haut: X, O, X -->
        <line x1="18" y1="18" x2="48" y2="48"/>
        <line x1="48" y1="18" x2="18" y2="48"/>
        
        <line x1="151" y1="18" x2="181" y2="48"/>
        <line x1="181" y1="18" x2="151" y2="48"/>
        
        <!-- Ligne du milieu: O, X, O -->
        <line x1="84" y1="84" x2="114" y2="114"/>
        <line x1="114" y1="84" x2="84" y2="114"/>
        
        <!-- Ligne du bas: X, O, X -->
        <line x1="18" y1="151" x2="48" y2="181"/>
        <line x1="48" y1="151" x2="18" y2="181"/>
        
        <line x1="151" y1="151" x2="181" y2="181"/>
        <line x1="181" y1="151" x2="151" y2="181"/>
      </g>
      
      <!-- Symboles O (bleu électrique fluo) -->
      <g fill="none" stroke="url(#neonBlue)" stroke-width="6" filter="url(#strongGlow)">
        <!-- Ligne du haut: X, O, X -->
        <circle cx="100" cy="33" r="15"/>
        
        <!-- Ligne du milieu: O, X, O -->
        <circle cx="33" cy="100" r="15"/>
        <circle cx="167" cy="100" r="15"/>
        
        <!-- Ligne du bas: X, O, X -->
        <circle cx="100" cy="167" r="15"/>
      </g>
    </g>
    
    <!-- Flash lumineux du côté gauche -->
    <ellipse cx="40" cy="160" rx="50" ry="80" fill="url(#lensFlare)" opacity="0.6" filter="url(#strongGlow)"/>
    
    <!-- Pile de jetons -->
    <g transform="translate(280, 140)" filter="url(#shadow)">
      <!-- Jeton 4 (arrière) -->
      <ellipse cx="50" cy="50" rx="40" ry="15" fill="#0a0a2a" stroke="#00ffff" stroke-width="2"/>
      <ellipse cx="50" cy="45" rx="40" ry="15" fill="#0a0a2a" stroke="#00ffff" stroke-width="2"/>
      
      <!-- Jeton 3 -->
      <ellipse cx="45" cy="35" rx="40" ry="15" fill="#0a0a2a" stroke="url(#chromeBevel)" stroke-width="3"/>
      <ellipse cx="45" cy="30" rx="40" ry="15" fill="#0a0a2a" stroke="url(#chromeBevel)" stroke-width="3"/>
      
      <!-- Jeton 2 -->
      <ellipse cx="40" cy="20" rx="40" ry="15" fill="#0a0a2a" stroke="url(#chromeBevel)" stroke-width="3"/>
      <ellipse cx="40" cy="15" rx="40" ry="15" fill="#0a0a2a" stroke="url(#chromeBevel)" stroke-width="3"/>
      
      <!-- Jeton 1 (avant) -->
      <ellipse cx="35" cy="5" rx="40" ry="15" fill="#0a0a2a" stroke="url(#chromeBevel)" stroke-width="4"/>
      <ellipse cx="35" cy="0" rx="40" ry="15" fill="#0a0a2a" stroke="url(#chromeBevel)" stroke-width="4"/>
      
      <!-- Gravure HTG sur le jeton -->
      <text x="35" y="5" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="16" font-weight="900" fill="#ffffff" filter="url(#glow)">HTG</text>
      
      <!-- Lueur bleue sous les jetons -->
      <ellipse cx="35" cy="60" rx="45" ry="18" fill="#0066ff" opacity="0.4" filter="url(#strongGlow)"/>
    </g>
    
    <!-- Texte TITATO en chrome 3D -->
    <g transform="translate(200, 340)">
      <!-- Ombre/effet 3D -->
      <text x="3" y="3" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="#000000" opacity="0.5">TITATO</text>
      
      <!-- Contour lumineux -->
      <text x="0" y="0" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="none" stroke="url(#neonBlue)" stroke-width="2" filter="url(#strongGlow)">TITATO</text>
      
      <!-- Texte principal chrome -->
      <text x="0" y="0" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="url(#textChrome)">TITATO</text>
      
      <!-- Lueur bleue en dessous -->
      <rect x="-80" y="3" width="160" height="2" fill="#00ffff" opacity="0.4" filter="url(#glow)"/>
    </g>
    
    <!-- Texte secondaire = X O O = -->
    <g transform="translate(200, 370)">
      <text x="0" y="0" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="18" font-weight="900">
        <tspan fill="url(#silverMetal)" filter="url(#glow)">=</tspan>
        <tspan fill="url(#silverMetal)" filter="url(#glow)"> X </tspan>
        <tspan fill="url(#neonBlue)" filter="url(#strongGlow)">O</tspan>
        <tspan fill="url(#neonBlue)" filter="url(#strongGlow)"> O </tspan>
        <tspan fill="url(#silverMetal)" filter="url(#glow)">=</tspan>
      </text>
    </g>
  </g>
</svg>
